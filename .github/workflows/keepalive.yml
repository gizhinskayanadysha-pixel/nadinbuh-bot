name: Keep Render alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://nadinbuh-bot.onrender.com/api/lead)
          echo "Status: $STATUS"
